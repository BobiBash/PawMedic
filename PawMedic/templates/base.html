<!DOCTYPE html>
{% load tailwind_cli %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PawMedic</title>
    {% tailwind_css %}
    {% block extra_head %}{% endblock %}
</head>
<body class="flex flex-col bg-gray-100 min-h-screen">
    <nav class="flex flex-row bg-green-300 p-6 sticky top-0">

    </nav>
    <main class="flex-grow grid place-items-center">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-green-300 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4 text-center text-gray-600">
            <p>&copy; 2026 PawMedic</p>
        </div>
    </footer>
</body>
</html>
