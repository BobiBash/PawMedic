{% extends 'base.html' %}

{% block content %}
<div class="flex m-4 flex-col gap-4 justify-center items-center">
    <div class="flex gap-2 mb-4">
        <a class="text-2xl m-2 border rounded-sm p-1 bg-gray-300" href="{% url 'tag-create' %}">Create Tag +</a>
        <a class="text-2xl m-2 border rounded-sm p-1 bg-gray-300" href="{% url 'forum-posts-list' %}">Back to Forum</a>
    </div>

    {% if tags %}
        <div class="flex flex-wrap gap-3 justify-center">
            {% for tag in tags %}
                <div class="flex border p-4 rounded-sm gap-2 items-center">
                    <a href="{% url 'tag-detail' pk=tag.pk %}" class="text-xl font-semibold text-blue-600 hover:underline">
                        #{{ tag.name }}
                    </a>
                    <div class="flex gap-1">
                        <a href="{% url 'tag-update' pk=tag.pk %}" class="bg-blue-500 text-center rounded-sm border border-black py-1 px-2 text-white hover:underline text-sm">Edit</a>
                        <a href="{% url 'tag-delete' pk=tag.pk %}" class="bg-red-500 text-center rounded-sm border border-black py-1 px-2 text-white hover:underline text-sm">Delete</a>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="text-gray-500 text-lg">No tags created yet.</p>
    {% endif %}
</div>
{% endblock %}
