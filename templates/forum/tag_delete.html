{% extends 'base.html' %}

{% block content %}
<div class="flex m-4 flex-col gap-4 justify-center items-center">
    <h1 class="text-2xl font-semibold">Delete Tag: {{ object.name }}</h1>
    <p class="text-gray-600">Are you sure you want to delete this tag?</p>
    <form method="post" class="flex gap-4">
        {% csrf_token %}
        <button type="submit" class="bg-red-500 rounded-sm border border-black py-2 px-4 text-white hover:underline">Confirm Delete</button>
        <a href="{% url 'tag-list' %}" class="bg-gray-500 rounded-sm border border-black py-2 px-4 text-white hover:underline">Cancel</a>
    </form>
</div>
{% endblock %}
