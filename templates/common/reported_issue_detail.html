{% extends 'base.html' %}

{% block content %}
    <div class="flex flex-col border rounded-sm p-2 w-md gap-2 m-4">
        <div class="p-4 flex flex-col gap-2 text-2xl items-center border-b">
            <div class="flex">
                <label class="font-semibold">Title: </label>
                <p class="ms-1">{{ issue.title }}</p>
            </div>
            <div class="flex">
                <label class="font-semibold">Created by: </label>
                <p class="ms-1">{{ issue.user.get_fullname }}</p>
            </div>
            <div class="flex">
                <label class="font-semibold">Created at: </label>
                <p class="ms-1">{{ issue.created_at }}</p>
            </div>
        </div>
        <div class="flex flex-col items-center text-xl p-4">
            <label class="font-semibold border-b border-gray-400">Content</label>
            <p class="text-xl w-md break-all p-2">{{ issue.issue }}</p>
        </div>

        <a href="{% url 'resolve-issue' pk=issue.pk %}" class="mx-auto border text-lg rounded-sm px-2 py-1 bg-gray-500 text-white border-black">
            Resolve issue
        </a>
    </div>
{% endblock %}
