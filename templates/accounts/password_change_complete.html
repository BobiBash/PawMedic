{% extends 'base.html' %}

{% block content %}
<div class="text-3xl flex flex-col gap-5 items-center">
    <p>Your password has successfully been changed.</p>
    {% if user.role == 'OWNER' %}
        <a class="text-2xl mx-auto border rounded-sm p-2 bg-green-300" href="{% url 'user-profile' %}">Back to Profile</a>
    {% else %}
        <a class="text-2xl mx-auto border rounded-sm p-2 bg-green-300" href="{% url 'vet-profile' %}">Back to Profile</a>
    {% endif %}
</div>
{% endblock %}
